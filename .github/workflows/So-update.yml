name: Sync Sony M3U Token

on:
  schedule:
    # Runs every 2 minutes (may be slightly delayed by GitHub)
    - cron: '*/2 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Fresh Token
        id: fetch
        run: |
          # 1. Fetch data from the secret URL
          SOURCE_DATA=$(curl -sL "${{ secrets.SO_BABA_TILU }}")
          
          # 2. Extract the 'hdnea=exp=' token 
          FRESH_TOKEN=$(echo "$SOURCE_DATA" | grep -o 'hdnea=exp=[^"'\''[:space:]&]*' | head -n 1)
          
          if [ -z "$FRESH_TOKEN" ]; then
            echo "Error: Could not extract hdnea token from source."
            exit 1
          fi
          
          echo "TOKEN=$FRESH_TOKEN" >> $GITHUB_ENV

      - name: Update Local M3U
        run: |
          if [ ! -f "so.m3u" ]; then
            echo "Error: so.m3u not found in repository."
            exit 1
          fi

          # Generate IST Timestamp
          TIMESTAMP=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %I:%M:%S %p IST")

          # 3. Replace old token with the fresh one in so.m3u
          sed -i "s|hdnea=exp=[^\"'[:space:]&]*|${{ env.TOKEN }}|g" so.m3u

          # 4. Update or Add the timestamp at the top of the file
          if grep -q "# Last Updated:" so.m3u; then
            sed -i "s|# Last Updated:.*|# Last Updated: $TIMESTAMP|g" so.m3u
          else
            sed -i "1i # Last Updated: $TIMESTAMP" so.m3u
          fi

      - name: Push Changes
        run: |
          git config --global user.name "tilu-07"
          git config --global user.email "267656420+tilu-07@users.noreply.github.com"
          
          git add so.m3u
          
          if git diff --staged --quiet; then
            echo "Token and timestamp are already up to date. Skipping commit."
          else
            # Use IST time for the commit message too
            COMMIT_TIME=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %I:%M %p")
            git commit -m "Auto-update Sony token: $COMMIT_TIME IST"
            git push
          fi
