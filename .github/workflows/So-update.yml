name: Sync Kids M3U Token

on:
  schedule:
    # Set to every 2 minutes
    - cron: '*/2 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scrape and Update M3U
        env:
          SECRET_KEY: ${{ secrets.SO_BABA_TILU }}
        run: |
          # 1. Check for links.txt
          if [ ! -f "links.txt" ]; then
            echo "Error: links.txt not found."
            exit 1
          fi

          # 2. Initialize the file with M3U header
          echo "#EXTM3U" > son.m3u

          # 3. Process links.txt
          # Using a while loop to read pairs of lines (Metadata + URL)
          while read -r METADATA; do
            # Skip empty lines
            [[ -z "$METADATA" ]] && continue
            
            # Read the next line for the URL
            read -r FETCH_URL
            
            if [[ "$METADATA" == "#EXTINF"* ]]; then
              echo "Processing: $METADATA"
              
              # 4. Fetch page source using your Secret Key
              # We use -s (silent) and -L (follow redirects)
              PAGE_SOURCE=$(curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
                            "$FETCH_URL?key=$SECRET_KEY" --connect-timeout 5 --max-time 10)
              
              # 5. Extract the LAST .m3u8 link found in the source
              REAL_STREAM_URL=$(echo "$PAGE_SOURCE" | grep -oE "https?://[^\"'\s]+\.m3u8[^\"'\s?]*" | tail -n 1)
              
              if [ -n "$REAL_STREAM_URL" ]; then
                echo "$METADATA" >> son.m3u
                echo "$REAL_STREAM_URL" >> son.m3u
              else
                echo "Warning: No stream found for $FETCH_URL"
              fi
            fi
          done < links.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated playlist
          git add son.m3u
          
          # Only commit if the content of son.m3u actually changed
          if git diff --staged --quiet; then
            echo "No changes in links. Skipping push."
          else
            git commit -m "Auto-sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
