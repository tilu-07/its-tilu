name: Sync son3 M3U Data

on:
  schedule:
    - cron: '*/2 * * * *'   # Runs every 2 minutes
  workflow_dispatch:        # Allows you to run it manually
  push:
    branches:
      - main

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch M3U Playlist
        env:
          SOURCE_URL: ${{ secrets.BABA_TILU }}
        run: |
          export TZ="Asia/Kolkata"
          
          # Pull latest changes to avoid conflicts
          git pull origin main --rebase
          
          # 1. Create the header with the custom IST timestamp
          TIMESTAMP=$(date +"%Y-%m-%d %I:%M:%S %p IST")
          echo "# baba-tilu" > son3.m3u
          echo "# Last Updated: $TIMESTAMP" >> son3.m3u
          echo "" >> son3.m3u
          
          echo "Downloading M3U from secret URL..."
          # 2. Append the remote content to the file after the header
          curl -sSL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" "$SOURCE_URL" >> son3.m3u
          
          # 3. Safety check: Verify the file has more than just the header (at least 4 lines)
          if [ $(wc -l < son3.m3u) -gt 3 ]; then
            echo "Playlist fetched successfully with header at $TIMESTAMP"
          else
            echo "Error: son3.m3u data is empty or failed to download."
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          export TZ="Asia/Kolkata"
          git add son3.m3u
          
          if ! git diff --staged --quiet; then
            # Uses a clean format for the commit message: 14-03-2026 10:45 AM
            git commit -m "Auto-update son3.m3u ✅ [$(date +'%d-%m-%Y %I:%M %p') IST]"
            git push origin main
          else
            echo "No changes in playlist data. Skipping push."
          fi
