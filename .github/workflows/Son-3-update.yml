name: Sync son3 M3U Data

on:
  schedule:
    - cron: '*/2 * * * *'   # Runs every 2 minutes
  workflow_dispatch:        # Allows you to run it manually
  push:
    branches:
      - main

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch M3U Playlist
        env:
          SOURCE_URL: ${{ secrets.BABA_TILU }}
        run: |
          export TZ="Asia/Kolkata"
          
          # Pull latest changes to avoid conflicts
          git pull origin main --rebase
          
          echo "Downloading M3U from secret URL..."
          # Added a standard Chrome User-Agent (-A) to bypass bot blocking
          curl -sSL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" "$SOURCE_URL" -o son3.m3u
          
          # Safety check: Verify the file actually downloaded and is not empty
          if [ -s son3.m3u ]; then
            echo "Playlist fetched successfully and saved to son3.m3u at $(date)"
          else
            echo "Error: son3.m3u is empty or failed to download. Check if the source URL is active."
            exit 1 # Stops the workflow so it doesn't push an empty file
          fi

      - name: Commit and Push Changes
        run: |
          export TZ="Asia/Kolkata"
          git add son3.m3u
          
          # Only commit if the content has actually changed
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update son3.m3u ✅ [$(date +'%d-%m-%Y %H:%M')]"
            git push origin main
          else
            echo "No changes in playlist data. Skipping push."
          fi
